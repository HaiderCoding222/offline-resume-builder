<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Offline-First Resume Builder | Premium Templates</title>
  <!-- html2pdf.js CDN for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Google Fonts for clean typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
  <!-- LEFT: FORMS -->
  <div class="form-panel">
    <div class="form-header">
      <h2>✍️ Resume Builder</h2>
      <p>Offline-first · Auto-save · Real-time preview</p>
    </div>
    
    <div class="template-switch">
      <button data-template="modern" class="template-btn active">✨ Modern Minimal</button>
      <button data-template="corporate" class="template-btn">🏛️ Professional Corporate</button>
      <button data-template="creative" class="template-btn">🎨 Creative / Tech</button>
    </div>

    <!-- Personal Info -->
    <div class="form-section">
      <div class="section-title">📌 Personal Details</div>
      <div class="input-group"><label>Full Name</label><input type="text" id="fullName" placeholder="Alex Morgan"></div>
      <div class="input-group"><label>Job Title / Headline</label><input type="text" id="jobTitle" placeholder="Frontend Developer"></div>
      <div class="input-group"><label>Email</label><input type="email" id="email" placeholder="hello@example.com"></div>
      <div class="input-group"><label>Phone</label><input type="text" id="phone" placeholder="+1 234 567 890"></div>
      <div class="input-group"><label>Address / Location</label><input type="text" id="location" placeholder="San Francisco, CA"></div>
    </div>

    <!-- Education with Add More -->
    <div class="form-section">
      <div class="section-title">🎓 Education <button type="button" id="addEducationBtn" class="btn-icon btn-add" style="margin-left:12px;">+ Add</button></div>
      <div id="educationContainer"></div>
    </div>

    <!-- Work Experience dynamic -->
    <div class="form-section">
      <div class="section-title">💼 Work Experience <button type="button" id="addWorkBtn" class="btn-icon btn-add" style="margin-left:12px;">+ Add</button></div>
      <div id="workContainer"></div>
    </div>

    <!-- Skills -->
    <div class="form-section">
      <div class="section-title">⚙️ Skills (comma separated)</div>
      <div class="input-group"><textarea id="skillsInput" rows="2" placeholder="React, JavaScript, CSS, Python, Figma"></textarea></div>
    </div>

    <!-- Projects dynamic -->
    <div class="form-section">
      <div class="section-title">🚀 Projects <button type="button" id="addProjectBtn" class="btn-icon btn-add" style="margin-left:12px;">+ Add</button></div>
      <div id="projectsContainer"></div>
    </div>
    <div style="padding: 16px 24px; font-size:0.7rem; color:#64748b; text-align:center;">✨ All changes autosave locally</div>
  </div>

  <!-- RIGHT: Preview + export -->
  <div class="preview-panel">
    <div class="preview-header">
      <h3>📄 Live Resume Preview</h3>
      <div>
        <button id="exportJsonBtn" class="json-btn">📁 Export JSON</button>
        <button id="importJsonBtn" class="json-btn">📂 Import JSON</button>
        <button id="downloadPdfBtn" class="pdf-btn">📥 Download PDF</button>
        <input type="file" id="importFileInput" accept=".json" style="display:none" />
      </div>
    </div>
    <div id="resumePreview" class="resume-sheet"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
