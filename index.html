<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Resume Builder</title>
    <link rel="stylesheet" href="style.css">
    <link id="template-styles" rel="stylesheet" href="">
</head>
<body>

    <header class="main-header">
        <div class="logo">📄 CV Craft</div>
        <nav class="nav-links">
            <button id="btn-builder" class="nav-btn active">🛠️ Builder</button>
            <button id="btn-templates" class="nav-btn">🔄 Templates</button>
            <button id="btn-download" class="nav-btn download-btn">📥 Download</button>
        </nav>
    </header>

    <main id="main-container">
        
        <div id="view-builder" class="view-section">
            <div class="split-screen">
                <div class="editor-panel">
                    <h2>Resume Details</h2>
                    <form id="resume-form" onsubmit="event.preventDefault();">
                        
                        <div class="form-section">
                            <h3>👤 Personal Info</h3>
                            <div class="photo-upload">
                                <label for="input-photo">Profile Photo</label>
                                <input type="file" id="input-photo" accept="image/*">
                                <div id="photo-preview" class="photo-preview"></div>
                            </div>
                            <input type="text" id="input-name" placeholder="Full Name" value="Ansar Abbas">
                            <input type="text" id="input-title" placeholder="Professional Title" value="Senior Dispenser/Paramedic">
                            <input type="email" id="input-email" placeholder="Email" value="hello@reallygreatsite.com">
                            <input type="tel" id="input-phone" placeholder="Phone Number" value="0345-8665835">
                            <textarea id="input-summary" placeholder="Professional Summary" rows="4">Experienced Senior Dispenser/Paramedic with expertise in medication dispensing, patient care, and orthopedic assistance. Skilled in emergency response, wound management, and plaster application.</textarea>
                        </div>

                        <div class="form-section">
                            <div class="section-header">
                                <h3>🎓 Education</h3>
                                <button type="button" class="btn-add-item" onclick="addEducationBlock()">➕ Add</button>
                            </div>
                            <div id="education-fields-container"></div>
                        </div>

                        <div class="form-section">
                            <div class="section-header">
                                <h3>💼 Experience</h3>
                                <button type="button" class="btn-add-item" onclick="addExperienceBlock()">➕ Add</button>
                            </div>
                            <div id="experience-fields-container"></div>
                        </div>

                        <div class="form-section">
                            <div class="section-header">
                                <h3>💻 Skills</h3>
                                <button type="button" class="btn-add-item" onclick="addSkillBlock()">➕ Add</button>
                            </div>
                            <div id="skills-fields-container" class="skills-input-grid"></div>
                        </div>

                        <div class="form-section">
                            <h3>➕ Custom Sections</h3>
                            <div id="dynamic-sections"></div>
                            <div class="dynamic-controls">
                                <input type="text" id="new-section-title" placeholder="Custom Section Name...">
                                <button type="button" id="btn-add-section">➕ Add Section</button>
                            </div>
                        </div>

                    </form>
                </div>

                <div class="preview-panel">
                    <div id="resume-preview-placeholder"></div>
                </div>
            </div>
        </div>

        <div id="view-templates" class="view-section hidden">
            <h2>🎨 Select a Template</h2>
            <div class="templates-grid" id="templates-list"></div>
        </div>

    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Smart Resume Builder. Built with Vanilla JS.</p>
    </footer>

    <script src="template-config.js"></script>
    <script src="template-default.js"></script>
    <script src="app.js"></script> 
</body>
</html>
