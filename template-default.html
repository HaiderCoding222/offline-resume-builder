<div class="cv-premium-container">
    <!-- Left Sidebar -->
    <div class="cv-sidebar">
        <div class="cv-avatar-box">
            <div class="cv-avatar-placeholder"></div>
        </div>
        
        <div class="sidebar-section">
            <h3 class="sidebar-heading">PROFILE</h3>
            <p id="tmpl-profile-text" class="sidebar-text"></p>
        </div>

        <div class="sidebar-section">
            <h3 class="sidebar-heading">SKILLS</h3>
            <div id="tmpl-skills-sidebar" class="sidebar-skills-list"></div>
        </div>

        <div id="tmpl-custom-sidebar-container"></div>
    </div>

    <!-- Right Main Content -->
    <div class="cv-main-content">
        <div class="cv-header-block">
            <h1 id="tmpl-name"></h1>
            <h2 id="tmpl-title" class="cv-profession-sub"></h2>
            <div class="cv-contact-row">
                <span id="tmpl-phone"></span>
                <span id="tmpl-email"></span>
            </div>
        </div>

        <div class="main-section">
            <h3 class="main-section-heading">EXPERIENCES</h3>
            <div id="tmpl-experience-list"></div>
        </div>

        <div class="main-section">
            <h3 class="main-section-heading">EDUCATION</h3>
            <div id="tmpl-education-list"></div>
        </div>
    </div>
</div>
